name: clang-format

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  format:
    name: clang-format-20 --dry-run
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-20
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-20

      - name: Verify formatting
        run: make format-check
