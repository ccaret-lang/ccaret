name: clang-tidy

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  tidy:
    name: clang-tidy-20 (live pipeline files)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ make clang-20

      - name: Configure & build (so compile_commands.json is generated)
        run: make build

      - name: Run clang-tidy
        run: make tidy
